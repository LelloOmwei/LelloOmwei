<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>OM-WEI Dashboard</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #status { border: 3px solid #00ff00; padding: 40px; font-size: 2.5em; text-align: center; width: 80%; max-width: 600px; transition: all 0.5s; }
        .konesuhladne { background: #003300; box-shadow: 0 0 30px #00ff00; color: #ffffff; border-color: #ffffff !important; }
        #history { margin-top: 20px; font-size: 0.9em; opacity: 0.5; white-space: pre-wrap; text-align: center; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="status">INICIALIZÁCIA...</div>
    <div id="history">Čakám na dáta z kroniky...</div>

    <script>
        function refresh() {
            fetch('http://localhost:8080/history')
                .then(r => r.text())
                .then(data => {
                    const lines = data.trim().split('\n');
                    const lastLine = lines[lines.length - 1] || "";
                    const statusDiv = document.getElementById('status');
                    const historyDiv = document.getElementById('history');

                    // Zobrazenie posledných 3 riadkov
                    historyDiv.innerText = lines.slice(-3).join('\n');

                    // Sémantická kontrola
                    if (lastLine.toLowerCase().includes('konesuhladne')) {
                        statusDiv.innerHTML = "🐎 KONESÚHLADNE.ow";
                        statusDiv.className = "konesuhladne pulse";
                        document.body.style.background = "#001100";
                    } else {
                        statusDiv.innerHTML = "📥 PRIJEM SIGNALU";
                        statusDiv.className = "";
                        document.body.style.background = "#050505";
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerText = "❌ BRÁNA OFFLINE";
                });
        }
        setInterval(refresh, 1000); // Kontrola každú sekundu
        refresh();
    </script>
</body>
</html>
